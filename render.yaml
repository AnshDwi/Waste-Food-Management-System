services:
  - type: web
    name: waste-food-api
    runtime: node
    rootDir: apps/api-gateway
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REFRESH_COOKIE_NAME
        value: wfm_refresh
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BROKER_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
