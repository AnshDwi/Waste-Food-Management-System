services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - web
  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    env_file:
      - ../../apps/api-gateway/.env.example
    depends_on:
      - mongodb
      - redis
      - rabbitmq
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
  ai-service:
    build:
      context: ../../apps/ai-service
      dockerfile: Dockerfile
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
